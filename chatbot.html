<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLITMS AI Chatbot</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
}

/* CHAT UI */
.chat-container {
    max-width: 400px;
    margin: auto;
    height: 95vh;
    display: flex;
    flex-direction: column;
    background: #0f172a;
}

/* HEADER */
.header {
    background: #075e54;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* MESSAGES */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

/* BUBBLES */
.msg {
    max-width: 75%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    line-height: 1.4;
}

.user {
    background: #25d366;
    align-self: flex-end;
}

.bot {
    background: #202c33;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #202c33;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    margin-left: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">🤖 PLITMS AI Assistant</div>

    <div class="messages" id="messages"></div>

    <div class="input-box">
        <input id="q" placeholder="Ask anything...">
        <button onclick="talk()">Send</button>
        <button onclick="startVoice()">🎤</button>
    </div>

</div>

<script>
const messages = document.getElementById("messages");

// ADD MESSAGE
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

// MAIN TALK FUNCTION
function talk(textInput = null) {
    let input = document.getElementById("q");
    let text = textInput || input.value;

    if (!text) return;

    addMessage(text, "user");

    let reply = getAIReply(text.toLowerCase());

    setTimeout(() => {
        addMessage(reply, "bot");
        speak(reply);
    }, 500);

    input.value = "";
}

// =====================
// AI LOGIC (SMART)
// =====================
function getAIReply(text) {

    // LANGUAGE DETECTION
    if (text.match(/[अ-ह]/)) return hindiReply(text);
    if (text.match(/[अ-ह]/)) return marathiReply(text);

    // ENGLISH
    if (text.includes("hello") || text.includes("hi"))
        return "Hello 👋 How can I help you?";

    if (text.includes("your name"))
        return "I am PLITMS AI Assistant 🤖";

    if (text.includes("diploma")) {
        let diplomas = JSON.parse(localStorage.getItem("diplomas")) || [];

        if (diplomas.length === 0)
            return "No diploma data available.";

        let msg = "📊 Available Diplomas:\n";

        diplomas.forEach(d => {
            msg += `${d.title} (${d.availableSeats}/${d.totalSeats}) - ${d.duration}\n`;
        });

        return msg;
    }

    if (text.includes("time"))
        return "⏰ " + new Date().toLocaleTimeString();

    if (text.includes("date"))
        return "📅 " + new Date().toDateString();

    if (text.includes("college") || text.includes("plitms"))
        return "PLITMS is an engineering college in Buldhana, Maharashtra.";

    return "🤔 I’m still learning. Please try something else!";
}

// =====================
// HINDI RESPONSES
// =====================
function hindiReply(text) {
    if (text.includes("नमस्ते"))
        return "नमस्ते! मैं आपकी कैसे मदद कर सकता हूँ?";

    if (text.includes("डिप्लोमा"))
        return "डिप्लोमा जानकारी देखने के लिए 'diploma' लिखें।";

    return "माफ कीजिए, मैं समझ नहीं पाया।";
}

// =====================
// MARATHI RESPONSES
// =====================
function marathiReply(text) {
    if (text.includes("नमस्कार"))
        return "नमस्कार! मी तुमची कशी मदत करू?";

    if (text.includes("डिप्लोमा"))
        return "डिप्लोमा माहिती पाहण्यासाठी 'diploma' लिहा.";

    return "माफ करा, मला समजले नाही.";
}

// =====================
// VOICE INPUT
// =====================
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        talk(text);
    };
}

// =====================
// SPEAK OUTPUT
// =====================
function speak(msg) {
    let speech = new SpeechSynthesisUtterance(msg);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
}
</script>

</body>
</html>
